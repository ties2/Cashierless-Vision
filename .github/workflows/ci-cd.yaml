name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Lint + unit tests are dependency-light by design: no torch/cv2/triton.
      # Installing only what the tests import keeps CI fast and removes the
      # heavy-wheel failure surface (GPU torch, tritonclient, etc.).
      - name: Install lint + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest numpy scipy
          pip install -e . --no-deps        # makes `import src...` resolve
      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .
      - name: Unit tests
        run: pytest -q

  build:
    name: Build gateway image
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Only the lightweight FastAPI gateway is built in CI. The Triton image
      # (FROM nvcr.io/nvidia/tritonserver, ~15GB) is too large for a standard
      # runner — build/push it from your deployment environment instead.
      - name: Build gateway image
        run: docker build -f deployment/Dockerfile.serving -t cashierless-gateway:${{ github.sha }} .
      # Wire your registry login + push here (GHCR/ECR), then an
      # environment-gated deploy job (shadow -> canary -> stable).